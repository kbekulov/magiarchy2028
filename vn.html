<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VN Simulator | Magiarchy</title>
    <meta
      name="description"
      content="Visual novel simulator for reading Magiarchy chapters in chronology order with animated text, narration and dialogue layouts, chapter background music, fullscreen mode, and chapter jump controls."
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script src="theme-init.js"></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="vn-simulator">
    <div id="mobile-shell"></div>

    <div class="container-fluid px-0 site-shell">
      <div class="row g-0">
        <aside class="col-lg-3 col-xl-2 d-none d-lg-block sidebar-column">
          <div id="sidebar-shell"></div>
        </aside>

        <main class="col-lg-9 col-xl-10 content-column">
          <div class="content-wrap">
            <section class="page-section">
              <div class="detail-panel vn-shell" id="vn-shell">
                <div class="vn-main-menu" id="vn-main-menu" hidden>
                  <div class="vn-main-menu__utility">
                    <button
                      class="btn btn-outline-light btn-sm"
                      type="button"
                      id="vn-main-menu-fullscreen"
                      aria-pressed="false"
                    >
                      Fullscreen
                    </button>
                  </div>

                  <div class="vn-main-menu__content">
                    <img
                      class="vn-main-menu__logo"
                      id="vn-main-menu-logo"
                      src="media/vn_simulator/main_menu/main_menu_logo.png"
                      alt="Magiarchy"
                    />

                    <div class="vn-main-menu__actions" role="menu" aria-label="VN main menu">
                      <button class="vn-main-menu__action is-primary" type="button" id="vn-main-menu-start">
                        Start
                      </button>
                      <button class="vn-main-menu__action" type="button">
                        Load Save
                      </button>
                      <button class="vn-main-menu__action" type="button">
                        Settings
                      </button>
                      <button class="vn-main-menu__action" type="button">
                        Quit
                      </button>
                    </div>
                  </div>
                </div>

                <div class="vn-topbar">
                  <div class="vn-statusline" aria-live="polite">
                    <span class="vn-statusline__order" id="vn-order">Chronology</span>
                    <span class="vn-statusline__divider" aria-hidden="true"></span>
                    <span class="vn-statusline__title" id="vn-chapter-title">Loading chapters…</span>
                  </div>

                  <div class="vn-toolbar">
                    <button class="btn btn-outline-light btn-sm" type="button" id="vn-main-menu-button">
                      Main Menu
                    </button>
                    <button class="btn btn-outline-light btn-sm" type="button" id="vn-menu-button">
                      Chapters
                    </button>
                    <button class="btn btn-outline-light btn-sm" type="button" id="vn-log-button">
                      Log
                    </button>
                    <button class="btn btn-outline-light btn-sm" type="button" id="vn-auto-toggle" aria-pressed="false">
                      Auto
                    </button>
                    <button class="btn btn-outline-light btn-sm" type="button" id="vn-bgm-toggle" aria-pressed="false">
                      BGM
                    </button>
                    <button class="btn btn-outline-light btn-sm" type="button" id="vn-skip-toggle" aria-pressed="false">
                      Skip Typing
                    </button>
                    <button class="btn btn-outline-light btn-sm" type="button" id="vn-fullscreen-toggle" aria-pressed="false">
                      Fullscreen
                    </button>
                  </div>
                </div>

                <div class="vn-stage" id="vn-stage">
                  <div class="vn-stage__background">
                    <div class="vn-sprite vn-sprite--left" id="vn-sprite-left">
                      <img class="vn-sprite__art" alt="" hidden />
                    </div>
                    <div class="vn-sprite vn-sprite--right" id="vn-sprite-right">
                      <img class="vn-sprite__art" alt="" hidden />
                    </div>
                  </div>

                  <div class="vn-chapter-intro" id="vn-chapter-intro" hidden>
                    <div class="vn-chapter-intro__frame">
                      <p class="vn-chapter-intro__eyebrow" id="vn-intro-order">Chronology</p>
                      <h2 class="vn-chapter-intro__title" id="vn-intro-title">Loading chapter…</h2>
                    </div>
                  </div>

                  <div class="vn-narration-overlay" id="vn-narration-overlay" hidden>
                    <div class="vn-narration-overlay__content">
                      <p class="vn-narration-overlay__text" id="vn-narration-text" aria-live="polite"></p>
                      <span class="vn-textbox__cursor" id="vn-cursor-narration" aria-hidden="true" hidden>▼</span>
                    </div>
                  </div>

                  <div class="vn-textbox" id="vn-textbox" hidden>
                    <p class="vn-textbox__nameplate" id="vn-nameplate" hidden></p>
                    <div class="vn-textbox__body">
                      <p class="vn-textbox__text" id="vn-textbox-text" aria-live="polite"></p>
                    </div>
                    <span class="vn-textbox__cursor" id="vn-cursor" aria-hidden="true" hidden>▼</span>
                  </div>

                  <div class="vn-controlbar">
                    <div class="vn-controlbar__hint" id="vn-hint">
                      Click the stage or press <kbd>Space</kbd> to advance.
                    </div>
                    <div class="vn-controlbar__actions">
                      <span class="vn-progress visually-hidden" id="vn-progress" aria-live="polite">0 / 0</span>
                      <button class="btn btn-outline-light btn-sm" type="button" id="vn-back-button">
                        Back
                      </button>
                      <button class="btn btn-outline-light btn-sm" type="button" id="vn-next-button">
                        Advance
                      </button>
                    </div>
                  </div>
                </div>

                <div class="vn-menu-backdrop" id="vn-menu-backdrop" hidden></div>
                <section
                  class="vn-menu-panel"
                  id="vn-menu-panel"
                  role="dialog"
                  aria-modal="true"
                  aria-labelledby="vn-menu-title"
                  hidden
                >
                  <div class="vn-menu-panel__head">
                    <div>
                      <p class="page-kicker mb-2">Chapter Select</p>
                      <h2 class="section-title mb-0" id="vn-menu-title">Chronology order</h2>
                    </div>
                    <button class="btn btn-outline-light btn-sm" type="button" id="vn-menu-close">Close</button>
                  </div>

                  <div class="vn-chapter-list mt-3" id="vn-chapter-list"></div>
                </section>

                <div class="vn-log-backdrop" id="vn-log-backdrop" hidden></div>
                <section
                  class="vn-log-panel"
                  id="vn-log-panel"
                  role="dialog"
                  aria-modal="true"
                  aria-labelledby="vn-log-title"
                  hidden
                >
                  <div class="vn-menu-panel__head">
                    <div>
                      <p class="page-kicker mb-2">Text Log</p>
                      <h2 class="section-title mb-0" id="vn-log-title">Recent beats</h2>
                    </div>
                    <button class="btn btn-outline-light btn-sm" type="button" id="vn-log-close">Close</button>
                  </div>

                  <div class="vn-log-list mt-3" id="vn-log-list"></div>
                </section>
              </div>
            </section>
          </div>
        </main>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="shell.js" defer></script>
    <script src="archive-core.js" defer></script>
    <script src="vn.js" defer></script>
  </body>
</html>
