<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reader | Divine Chamber</title>
    <meta
      name="description"
      content="Reader page for Divine Chamber archive entries loaded from Markdown."
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="reader">
    <div id="mobile-shell"></div>

    <div class="container-fluid px-0 site-shell">
      <div class="row g-0">
        <aside class="col-lg-3 col-xl-2 d-none d-lg-block sidebar-column">
          <div id="sidebar-shell"></div>
        </aside>

        <main class="col-lg-9 col-xl-10 content-column">
          <div class="content-wrap">
            <section class="page-banner">
              <p class="page-kicker" id="reader-kind">Reader</p>
              <h1 class="page-title" id="reader-title">Loading archive file</h1>
              <p class="page-copy banner-copy mt-3" id="reader-summary">
                Pulling file metadata and source text from the archive manifest.
              </p>
            </section>

            <section class="page-section mt-4">
              <div class="reader-layout" id="reader-layout">
                <div class="reader-main">
                  <div class="record-strip" id="reader-meta"></div>
                  <div class="record-grid" id="reader-record"></div>
                  <article class="reader-card mt-4" id="reader-card">
                    <div class="markdown-body" id="reader-body">
                      <p class="page-copy mb-0">Loading file text.</p>
                    </div>
                  </article>
                  <div class="reader-nav mt-4" id="reader-nav"></div>
                </div>

                <aside class="reader-side">
                  <div class="detail-panel">
                    <div class="section-subheader">
                      <h2 class="subsection-title">Archive Context</h2>
                    </div>
                    <div id="reader-context"></div>
                    <div class="mt-4">
                      <a class="btn btn-outline-light w-100" href="library.html">Back To Archive</a>
                    </div>
                    <div class="mt-3">
                      <a class="btn btn-brass w-100" href="#" id="reader-source-link" target="_blank" rel="noreferrer">
                        Open Source Markdown
                      </a>
                    </div>
                  </div>

                  <div class="related-section mt-4">
                    <div class="section-subheader">
                      <h2 class="subsection-title">Related Files</h2>
                    </div>
                    <div class="entry-grid" id="related-list"></div>
                  </div>
                </aside>
              </div>
            </section>
          </div>
        </main>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="shell.js" defer></script>
    <script src="archive-core.js" defer></script>
    <script src="reader.js" defer></script>
  </body>
</html>
