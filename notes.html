<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Global Prompt | Magiarchy</title>
    <meta
      name="description"
      content="Global prompt and supporting writer references for Magiarchy."
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script src="theme-init.js"></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="global-prompt">
    <div id="mobile-shell"></div>

    <div class="container-fluid px-0 site-shell">
      <div class="row g-0">
        <aside class="col-lg-3 col-xl-2 d-none d-lg-block sidebar-column">
          <div id="sidebar-shell"></div>
        </aside>

        <main class="col-lg-9 col-xl-10 content-column">
          <div class="content-wrap">
            <section class="page-banner">
              <p class="page-kicker">Global Prompt</p>
              <h1 class="page-title">Global Story Prompt</h1>
              <p class="page-copy banner-copy mt-3">
                This page should open directly into the active canon pack for Magiarchy. Supporting
                writer notes stay below it so the chapter toolkit and music direction remain close at hand.
              </p>
            </section>

            <section class="page-section mt-4">
              <div class="detail-panel" id="notes-featured"></div>
            </section>

            <section class="page-section mt-4">
              <div class="section-header">
                <p class="page-kicker">Supporting Notes</p>
                <h2 class="section-title">Toolkit and reference material beside the canon pack</h2>
              </div>
              <div class="entry-grid" id="notes-list"></div>
            </section>
          </div>
        </main>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="shell.js" defer></script>
    <script src="archive-core.js" defer></script>
    <script src="notes.js" defer></script>
  </body>
</html>
