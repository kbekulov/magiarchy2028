<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Global Prompt | Magiarchy</title>
    <meta
      name="description"
      content="Global prompt and supporting writer references for Magiarchy."
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="global-prompt">
    <div id="mobile-shell"></div>

    <div class="container-fluid px-0 site-shell">
      <div class="row g-0">
        <aside class="col-lg-3 col-xl-2 d-none d-lg-block sidebar-column">
          <div id="sidebar-shell"></div>
        </aside>

        <main class="col-lg-9 col-xl-10 content-column">
          <div class="content-wrap">
            <section class="page-banner">
              <p class="page-kicker">Global Prompt</p>
              <h1 class="page-title">Current canon pack and supporting writer references</h1>
              <p class="page-copy banner-copy mt-3">
                The featured note on this page is the active global prompt for Magiarchy. The supporting
                notes stay beside it so the canon pack, chapter toolkit, and music direction remain easy to reach.
              </p>
            </section>

            <section class="page-section mt-4">
              <div class="row g-4">
                <div class="col-xl-5">
                  <div class="detail-panel" id="notes-featured"></div>
                </div>
                <div class="col-xl-7">
                  <div class="entry-grid" id="notes-list"></div>
                </div>
              </div>
            </section>
          </div>
        </main>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="shell.js" defer></script>
    <script src="archive-core.js" defer></script>
    <script src="notes.js" defer></script>
  </body>
</html>
