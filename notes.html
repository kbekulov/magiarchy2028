<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notes & Logs | Divine Chamber</title>
    <meta
      name="description"
      content="Development notes, drafts, and project logs for Divine Chamber."
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="notes">
    <div id="mobile-shell"></div>

    <div class="container-fluid px-0 site-shell">
      <div class="row g-0">
        <aside class="col-lg-3 col-xl-2 d-none d-lg-block sidebar-column">
          <div id="sidebar-shell"></div>
        </aside>

        <main class="col-lg-9 col-xl-10 content-column">
          <div class="content-wrap">
            <section class="page-banner">
              <p class="page-kicker">Notes & Logs</p>
              <h1 class="page-title">Development, drafts, and archive thinking</h1>
              <p class="page-copy banner-copy mt-3">
                Working notes are separated from canon-facing material, but still treated
                as first-class parts of the project archive.
              </p>
            </section>

            <section class="page-section mt-4">
              <div class="row g-4">
                <div class="col-xl-5">
                  <div class="detail-panel" id="notes-featured"></div>
                </div>
                <div class="col-xl-7">
                  <div class="entry-grid" id="notes-list"></div>
                </div>
              </div>
            </section>
          </div>
        </main>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="shell.js" defer></script>
    <script src="archive-core.js" defer></script>
    <script src="notes.js" defer></script>
  </body>
</html>
